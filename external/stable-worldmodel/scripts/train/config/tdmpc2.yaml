defaults:
  - _self_
  - launcher: local

hydra:
  job:
    chdir: true

# --- Run ---
output_model_name: tdmpc2_output
subdir: null
seed: 1

# --- Data ---
dataset_name: null
goal_obs_key: state
cache_dir: null
cache_dataset: true
batch_size: 256
num_workers: 16
train_split: 0.9
image_size: 64

# --- Planning / MPPI parameters used only during evaluation ---
mpc: true
iterations: 12
num_samples: 1024
num_elites: 64
num_pi_trajs: 256
min_std: 0.01
max_std: 0.1
temperature: 0.5

# --- World Model ---
wm:
  horizon: 5
  mlp_dim: 384
  enc_dim: 256
  simnorm_dim: 8
  num_q: 5
  rho: 0.5
  tau: 0.01
  consistency_coef: 20.0
  reward_coef: 0.1
  value_coef: 0.1
  discount: 0.99
  uncertainty_penalty: 0.5
  entropy_coef: 1e-4
  name: tdmpc2

  num_bins: 101
  vmin: -6
  vmax: 2

  encoding:
    state: 128

# --- Optimizer ---
optimizer:
  type: AdamW
  lr: 3e-4
enc_lr_scale: 0.3

# --- Trainer ---
trainer:
  max_epochs: 250
  strategy: auto
  devices: 1
  accelerator: gpu
  precision: 16-mixed
  gradient_clip_val: 20.0

# --- Logging ---
wandb:
  enable: True
  project: null
  entity: null
