# MVP Stage-1 alignment: single-GPU 1-epoch sanity (wm-llm-alignment §6, P1).
#
# MiniLM WM (mvp_v1 synthetic trajectories) + Qwen2.5-0.5B-Instruct (hidden
# 896). Checks the InfoNCE+cosine alignment loop runs with no NaN and loss
# falls before scaling to the full Stage-1 config. WM ckpt optional (random
# init is a valid sanity); pass model.wm_ckpt to warm-start.
defaults:
  - launcher: local
  - data: swetraj
  - model@model.wm: wm_codebert_mvp
  - _self_

experiment:
  stage: stage1
  save_ckpt: false

output_model_name: pca_align_stage1_mvp
output_dir: runs/pca_align_mvp
subdir: ${hydra:job.id}

num_workers: 2
seed: 0

trainer:
  max_epochs: 1
  devices: 1
  accelerator: gpu
  precision: 16-mixed
  gradient_clip_val: 1.0
  log_every_n_steps: 5

loader:
  batch_size: 8
  num_workers: ${num_workers}
  persistent_workers: false
  prefetch_factor: 2
  pin_memory: true

optimizer:
  type: AdamW
  lr: 1e-4
  weight_decay: 1e-4

wm:
  history_size: 1
  num_preds: 1
  embed_dim: 384

model:
  wm_ckpt: null
  llm_name: Qwen/Qwen2.5-0.5B-Instruct
  wm_config_name: wm_codebert_mvp
  cond_signal: both
  alpha: 0.5
  projector:
    hidden_dim: 1024
    out_dim: 896   # = Qwen2.5-0.5B hidden size
    num_tokens: 4

loss:
  align:
    tau: 0.07
    lam: 1.0

data:
  path: data/trajectories/mvp_v1
  max_obs_chars: 4000

wandb:
  enabled: false
  config:
    project: pca-align
    mode: offline
