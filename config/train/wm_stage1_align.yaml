# Stage-1: LLaVA feature alignment (projector only) — wm-llm-alignment §2.4.
#
# Trains WorldModelProjector with InfoNCE + cosine so the projected
# predicted-outcome latent ẑ₁ lands where Qwen represents the actual result
# text. WM (HumanEval Stage-0) + LLM frozen. Supersedes projector_stage1.yaml
# as the Stage-1 entry (spec §3 R7): model.wm_ckpt MUST point at the Round-4
# HumanEval Stage-0 best ckpt (NOT the Two-Room wm_v1), llm = Qwen2.5-1.5B.
#
#   python train_pca.py --config-name=wm_stage1_align \
#       model.wm_ckpt=<stage0 best> data.path=<humaneval_wm dir>
defaults:
  - launcher: local
  - data: humaneval_wm
  - model@model.wm: wm_codebert_humaneval
  - _self_

experiment:
  stage: stage1
  save_ckpt: false  # projector saved by StageCkptCallback (spec §3 R6)

output_model_name: pca_align_stage1_v1
output_dir: runs/pca_align
subdir: ${hydra:job.id}

num_workers: 2
seed: 0

# Turing / 3090: no bf16 — fp16 mixed precision (CLAUDE.md / R01).
trainer:
  max_epochs: 3
  devices: 1
  accelerator: gpu
  precision: 16-mixed
  gradient_clip_val: 1.0
  log_every_n_steps: 5

loader:
  batch_size: 16
  num_workers: ${num_workers}
  persistent_workers: false
  prefetch_factor: 2
  pin_memory: true

optimizer:
  type: AdamW
  lr: 1e-4
  weight_decay: 1e-4

# Single-step prediction window (history_size + num_preds = 2), matching
# the HumanEval Stage-0 trajectory schema.
wm:
  history_size: 1
  num_preds: 1
  embed_dim: 384

model:
  wm_ckpt: null  # REQUIRED override: model.wm_ckpt=<stage0 best ckpt>
  llm_name: Qwen/Qwen2.5-1.5B-Instruct
  wm_config_name: wm_humaneval
  cond_signal: both  # ablation (e): z1 | goal | both (spec §6)
  alpha: 0.5
  projector:
    hidden_dim: 1024
    out_dim: 1536   # = Qwen2.5-1.5B hidden size
    num_tokens: 4   # K soft tokens (spec §2.3)

loss:
  align:
    tau: 0.07
    lam: 1.0

data:
  path: data/trajectories/humaneval_wm_v1
  max_obs_chars: 4000

wandb:
  enabled: false
  config:
    project: pca-align
    mode: offline
